name: Scrape Forex News Calendar

on:
  schedule:
    # Runs once a day at 11:50 PM IST (18:20 UTC)
    - cron: '20 18 * * *'
  workflow_dispatch:
    # Allow manual runs from the GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies (Chrome & ChromeDriver)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python Dependencies
        run: |
          cd scraper
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: |
          cd scraper
          python scraper.py scrape --config config.yaml --months this next
          python generate_news_json.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated sync: Update news calendar data"
