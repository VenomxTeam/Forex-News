name: Scrape Forex News Calendar

on:
  schedule:
    # Runs at 5 and 35 minutes past the hour, Monday-Friday, during active market hours (06:00-21:00 UTC)
    # This catches 99% of high impact news exactly 5 mins after release while keeping runs under 32/day (Account Safe!)
    - cron: '5,35 6-21 * * 1-5'
    # End of day sync for any remaining low/medium news
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual runs from the GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies (Chrome & ChromeDriver)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python Dependencies
        run: |
          cd scraper
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: |
          cd scraper
          python generate_news_json.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated sync: Update news calendar data"
          file_pattern: 'scraper/news.json scraper/news/monthly/*.json'
